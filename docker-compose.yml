services:
  app:
    build:
      context: .
      target: dev
    container_name: periodical_dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${DEV_PORT:-8001}:8000"
    volumes:
      - ./data:/app/data
      - ./app:/app/app
      - ./tests:/app/tests
    environment:
      # Åsidosätt PRODUCTION från .env -- vi kör alltid i dev-läge här
      - PRODUCTION=false
    env_file:
      - .env
    labels:
      - com.centurylinklabs.watchtower.enable=false
