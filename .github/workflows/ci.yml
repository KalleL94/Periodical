name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          # Match the version run in production (venv) and used to compile requirements.txt
          python-version: "3.12"
          cache: "pip" # Enables automatic caching of dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs the project plus dev dependencies (pytest, ruff, etc.) from pyproject.toml
          pip install ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run Tests
        env:
          # Dummy variables in case the tests load the application configuration
          SECRET_KEY: "test_secret_key_for_ci"
          PRODUCTION: "false"
        run: |
          # Fail the build if coverage drops below the floor (guards against regression, not a target)
          pytest --cov=app --cov-report=term-missing --cov-fail-under=50
