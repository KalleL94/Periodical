{# app/templates/login.html #}
{% extends "base.html" %}

{% block title %}Periodical – {{ t.login_title }}{% endblock %}

{% block page_content %}

<div class="login-shell">
    <div class="login-grid-bg" aria-hidden="true"></div>
    <div class="login-now" aria-hidden="true"></div>

    <div class="card login-card">
        <h2>{{ t.login_title }}</h2>

        {% if error %}
            <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <div class="login-field">
                <label for="username">{{ t.login_username }}</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="login-field">
                <label for="password">{{ t.login_password }}</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn login-submit">{{ t.login_button }}</button>
        </form>
    </div>
</div>

{% endblock %}
